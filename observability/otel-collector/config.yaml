# =============================================================================
# OpenTelemetry Collector Configuration
# =============================================================================
# Central collector that receives telemetry from all microservices and
# routes to appropriate backends (Jaeger, Prometheus, Loki).
# =============================================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Scrape Prometheus metrics from services
  prometheus:
    config:
      scrape_configs:
        - job_name: 'order-service'
          scrape_interval: 15s
          kubernetes_sd_configs:
            - role: pod
              namespaces:
                names: ['platform']
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              regex: order-service
              action: keep
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
              target_label: __address__
              regex: (.+)
              replacement: ${1}:$$1

        - job_name: 'user-service'
          scrape_interval: 15s
          kubernetes_sd_configs:
            - role: pod
              namespaces:
                names: ['platform']
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              regex: user-service
              action: keep

        - job_name: 'api-gateway'
          scrape_interval: 15s
          kubernetes_sd_configs:
            - role: pod
              namespaces:
                names: ['platform']
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              regex: api-gateway
              action: keep

        - job_name: 'pricing-engine'
          scrape_interval: 15s
          kubernetes_sd_configs:
            - role: pod
              namespaces:
                names: ['platform']
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              regex: pricing-engine
              action: keep

  # Collect K8s cluster metrics
  k8s_cluster:
    collection_interval: 30s
    node_conditions_to_report:
      - Ready
      - MemoryPressure
      - DiskPressure

  # Host metrics from the collector node itself
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu: {}
      memory: {}
      disk: {}
      network: {}

processors:
  # Batch telemetry before sending
  batch:
    send_batch_size: 1024
    send_batch_max_size: 2048
    timeout: 5s

  # Add resource attributes
  resource:
    attributes:
      - key: deployment.environment
        from_attribute: k8s.namespace.name
        action: upsert
      - key: platform.name
        value: developer-portal
        action: insert

  # Memory limiter to prevent OOM
  memory_limiter:
    check_interval: 5s
    limit_mib: 512
    spike_limit_mib: 128

  # Filter out noisy health check spans
  filter/health:
    error_mode: ignore
    traces:
      span:
        - 'attributes["http.target"] == "/healthz"'
        - 'attributes["http.target"] == "/readyz"'
        - 'attributes["http.target"] == "/metrics"'

  # Add K8s metadata
  k8sattributes:
    auth_type: "serviceAccount"
    passthrough: false
    extract:
      metadata:
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.deployment.name
        - k8s.namespace.name
        - k8s.node.name
      labels:
        - tag_name: app
          key: app
          from: pod

  # Tail-based sampling for traces
  tail_sampling:
    decision_wait: 10s
    num_traces: 100000
    expected_new_traces_per_sec: 1000
    policies:
      # Always sample errors
      - name: errors
        type: status_code
        status_code:
          status_codes:
            - ERROR
      # Always sample slow requests (> 2s)
      - name: slow-requests
        type: latency
        latency:
          threshold_ms: 2000
      # Sample 10% of normal traffic
      - name: probabilistic
        type: probabilistic
        probabilistic:
          sampling_percentage: 10

exporters:
  # Export traces to Jaeger
  otlp/jaeger:
    endpoint: jaeger-collector.observability.svc.cluster.local:4317
    tls:
      insecure: true

  # Export metrics to Prometheus
  prometheusremotewrite:
    endpoint: http://prometheus-server.observability.svc.cluster.local:9090/api/v1/write
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true

  # Export logs to Loki
  loki:
    endpoint: http://loki.observability.svc.cluster.local:3100/loki/api/v1/push
    labels:
      resource:
        service.name: "service_name"
        k8s.namespace.name: "namespace"
        k8s.pod.name: "pod"

  # Debug exporter for troubleshooting (disabled in prod)
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

  zpages:
    endpoint: 0.0.0.0:55679

  pprof:
    endpoint: 0.0.0.0:1777

service:
  extensions: [health_check, zpages, pprof]
  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, filter/health, k8sattributes, tail_sampling, resource, batch]
      exporters: [otlp/jaeger]

    metrics:
      receivers: [otlp, prometheus, hostmetrics, k8s_cluster]
      processors: [memory_limiter, k8sattributes, resource, batch]
      exporters: [prometheusremotewrite]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, k8sattributes, resource, batch]
      exporters: [loki]
