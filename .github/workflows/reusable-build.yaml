# Reusable workflow — Build, scan, and push Docker image
# Called by language-specific CI workflows

name: Reusable Build & Push

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      dockerfile_path:
        required: false
        type: string
        default: Dockerfile
      image_tag:
        required: false
        type: string
        default: ''
    secrets:
      # TODO: CONFIGURE — Set these secrets in GitHub repo settings
      # Settings → Secrets and variables → Actions
      AWS_ROLE_ARN:
        required: true        # <-- CONFIGURE: IAM role ARN for GitHub Actions OIDC
      ECR_REGISTRY:
        required: true        # <-- CONFIGURE: AWS ECR registry URL (123456789.dkr.ecr.us-east-1.amazonaws.com)

permissions:
  id-token: write   # For OIDC auth to AWS
  contents: read
  packages: write
  security-events: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "version=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
            echo "version=${GITHUB_REF_NAME}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      # TODO: EXTERNAL DEPENDENCY — AWS OIDC authentication
      # Requires GitHub OIDC provider configured in AWS IAM
      # See terraform/modules/iam/main.tf for the OIDC provider setup
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Security scan — Trivy vulnerability scanner
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: ${{ inputs.service_path }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      # Build and push Docker image
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.service_path }}
          file: ${{ inputs.service_path }}/${{ inputs.dockerfile_path }}
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/${{ inputs.service_name }}:${{ steps.meta.outputs.version }}
            ${{ secrets.ECR_REGISTRY }}/${{ inputs.service_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # Scan the built image for vulnerabilities
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.ECR_REGISTRY }}/${{ inputs.service_name }}:${{ steps.meta.outputs.version }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # Set to '1' to fail on vulnerabilities

  # Update deployment manifests to trigger Argo CD sync
  update-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update dev overlay image tag
        run: |
          cd deployments/overlays/dev
          # Update the image tag in kustomization.yaml
          sed -i "s|newTag: .*|newTag: ${{ needs.build-and-push.outputs.image_tag }}|" kustomization.yaml
          # Only update the specific service's tag
          # In production, use kustomize edit set image

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/
          git diff --staged --quiet || git commit -m "chore: update ${{ inputs.service_name }} image to ${{ needs.build-and-push.outputs.image_tag }}"
          git push
