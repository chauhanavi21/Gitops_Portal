# =============================================================================
# Kubernetes RBAC — Platform Roles
# =============================================================================
# Three-tier role model: platform-admin, team-owner, developer
# =============================================================================

# ─── ClusterRoles ────────────────────────────────────────────────────────────

# Platform Administrator — Full cluster access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-admin
  labels:
    platform.role: admin
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
  - nonResourceURLs: ["*"]
    verbs: ["*"]
---
# Team Owner — Manage namespaced resources, read cluster
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: team-owner
  labels:
    platform.role: team-owner
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
# Team Owner — Namespace-scoped (applied per-namespace)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: team-owner-namespace
  labels:
    platform.role: team-owner
rules:
  - apiGroups: ["", "apps", "batch", "autoscaling"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch"]
---
# Developer — Read-only + port-forward + logs
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: developer
  labels:
    platform.role: developer
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/status", "services", "endpoints", "configmaps", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
# ─── ClusterRoleBindings ────────────────────────────────────────────────────

# Bind platform-admin to the platform-admins group
# TODO: CONFIGURE — Map group name to your identity provider groups
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platform-admin-binding
subjects:
  - kind: Group
    name: platform-admins
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: platform-admin
  apiGroup: rbac.authorization.k8s.io
---
# ─── Namespace RoleBindings (platform namespace) ────────────────────────────

# Team owners in the platform namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: team-owner-binding
  namespace: platform
subjects:
  - kind: Group
    name: team-owners
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: team-owner-namespace
  apiGroup: rbac.authorization.k8s.io
---
# Developers in the platform namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developer-binding
  namespace: platform
subjects:
  - kind: Group
    name: developers
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: developer
  apiGroup: rbac.authorization.k8s.io
---
# ─── ServiceAccount for CI/CD ───────────────────────────────────────────────

apiVersion: v1
kind: ServiceAccount
metadata:
  name: ci-deployer
  namespace: platform
  annotations:
    # TODO: CONFIGURE — Set the IAM role ARN for IRSA
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/github-actions-role"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-deployer-binding
  namespace: platform
subjects:
  - kind: ServiceAccount
    name: ci-deployer
    namespace: platform
roleRef:
  kind: ClusterRole
  name: team-owner-namespace
  apiGroup: rbac.authorization.k8s.io
