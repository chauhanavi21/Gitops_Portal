# =============================================================================
# Sealed Secrets Configuration
# =============================================================================
# Sealed Secrets encrypts K8s Secrets client-side so they can be safely
# stored in Git. Only the Sealed Secrets controller can decrypt them.
# =============================================================================
# INSTALL: kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.24.5/controller.yaml

# ─── Sealed Secret: Database Credentials ────────────────────────────────────
# Generate with:
# kubeseal --format=yaml --cert=sealed-secrets-pub.pem < secret.yaml > sealed-secret.yaml
#
# Example input secret (DO NOT commit this):
# apiVersion: v1
# kind: Secret
# metadata:
#   name: database-credentials
#   namespace: platform
# type: Opaque
# stringData:
#   DATABASE_URL: "postgresql://user:password@db-host:5432/platform"
#   REDIS_URL: "redis://redis-host:6379"
#
# TODO: CONFIGURE — Run kubeseal to encrypt your actual secrets
# The value below is a PLACEHOLDER — replace with your sealed secret
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: database-credentials
  namespace: platform
spec:
  encryptedData:
    # TODO: CONFIGURE — Replace with actual sealed values from kubeseal CLI
    DATABASE_URL: "AgBy3i4OJSWK+PiTySYZz... (sealed value)"
    REDIS_URL: "AgBy3i4OJSWK+PiTySYZz... (sealed value)"
  template:
    metadata:
      name: database-credentials
      namespace: platform
    type: Opaque
---
# ─── Sealed Secret: GitHub Token (for Backstage) ────────────────────────────
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: github-token
  namespace: platform
spec:
  encryptedData:
    # TODO: CONFIGURE — Seal your GitHub PAT
    GITHUB_TOKEN: "AgBy3i4OJSWK+PiTySYZz... (sealed value)"
  template:
    metadata:
      name: github-token
      namespace: platform
    type: Opaque
---
# ─── Sealed Secret: Argo CD Repository Credentials ──────────────────────────
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: argocd-repo-creds
  namespace: argocd
spec:
  encryptedData:
    # TODO: CONFIGURE — Seal your Git credentials
    password: "AgBy3i4OJSWK+PiTySYZz... (sealed value)"
    username: "AgBy3i4OJSWK+PiTySYZz... (sealed value)"
  template:
    metadata:
      name: argocd-repo-creds
      namespace: argocd
      labels:
        argocd.argoproj.io/secret-type: repo-creds
    type: Opaque
---
# ─── Pod Security Standards ─────────────────────────────────────────────────
# Enforce baseline Pod Security Standards at namespace level
apiVersion: v1
kind: Namespace
metadata:
  name: platform
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: v1.28
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: v1.28
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: v1.28
