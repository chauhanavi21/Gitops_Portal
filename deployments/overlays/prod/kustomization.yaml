apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: platform-prod

resources:
  - ../../base
  - hpa.yaml
  - pdb.yaml

commonLabels:
  environment: prod

images:
  - name: order-service
    newName: YOUR_ECR_REGISTRY.dkr.ecr.us-east-1.amazonaws.com/order-service
    newTag: v1.0.0  # Prod uses semver tags only
  - name: user-service
    newName: YOUR_ECR_REGISTRY.dkr.ecr.us-east-1.amazonaws.com/user-service
    newTag: v1.0.0
  - name: api-gateway
    newName: YOUR_ECR_REGISTRY.dkr.ecr.us-east-1.amazonaws.com/api-gateway
    newTag: v1.0.0
  - name: pricing-engine
    newName: YOUR_ECR_REGISTRY.dkr.ecr.us-east-1.amazonaws.com/pricing-engine
    newTag: v1.0.0

patches:
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3

configMapGenerator:
  - name: platform-config
    literals:
      - ENVIRONMENT=prod
      - LOG_LEVEL=warn
      - ENABLE_DEBUG=false
