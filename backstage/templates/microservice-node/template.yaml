apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: microservice-node
  title: Microservice — Node.js (Express + TypeScript)
  description: |
    Create a production-ready Node.js microservice with Express, TypeScript,
    OpenTelemetry instrumentation, Prometheus metrics, Dockerfile,
    Kustomize manifests, and CI/CD pipeline.
  tags:
    - node
    - typescript
    - microservice
    - golden-path
spec:
  owner: group:platform-engineering
  type: service

  parameters:
    - title: Service Information
      required:
        - name
        - description
        - owner
      properties:
        name:
          title: Service Name
          type: string
          pattern: "^[a-z][a-z0-9-]*$"
          ui:autofocus: true
        description:
          title: Description
          type: string
        owner:
          title: Owner
          type: string
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - Group

    - title: Technical Configuration
      properties:
        port:
          title: Service Port
          type: integer
          default: 3000
        nodeVersion:
          title: Node.js Version
          type: string
          default: "18"
          enum: ["18", "20"]

    - title: Deployment Configuration
      properties:
        namespace:
          title: Kubernetes Namespace
          type: string
          default: platform
        replicas:
          title: Initial Replicas
          type: integer
          default: 2

  steps:
    - id: fetch-skeleton
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          port: ${{ parameters.port }}
          nodeVersion: ${{ parameters.nodeVersion }}
          namespace: ${{ parameters.namespace }}
          replicas: ${{ parameters.replicas }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        allowedHosts: ["github.com"]
        repoUrl: "github.com?owner=YOUR_ORG&repo=${{ parameters.name }}"
        description: ${{ parameters.description }}
        defaultBranch: main

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
